<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf6ef"/>
      <stop offset="100%" stop-color="#f3ead5"/>
    </linearGradient>
    <linearGradient id="hoopGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8d5a0"/>
      <stop offset="30%" stop-color="#d4b574"/>
      <stop offset="60%" stop-color="#c6994a"/>
      <stop offset="100%" stop-color="#b8862f"/>
    </linearGradient>
    <linearGradient id="hoopGold2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8d5a0"/>
      <stop offset="30%" stop-color="#d4b574"/>
      <stop offset="60%" stop-color="#c6994a"/>
      <stop offset="100%" stop-color="#b8862f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#b8862f" flood-opacity="0.12"/>
    </filter>
    <radialGradient id="spotlight" cx="0.5" cy="0.42" r="0.48">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#spotlight)"/>

  <!-- Left hoop earring -->
  <g filter="url(#shadow)" transform="translate(205, 370)">
    <!-- Clasp/post at top -->
    <line x1="0" y1="-120" x2="0" y2="-105" stroke="#c6994a" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
    <circle cx="0" cy="-122" r="3" fill="#c6994a" opacity="0.6"/>

    <!-- Hoop - thin elegant circle -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="url(#hoopGold)" stroke-width="3" opacity="0.85"/>
    <!-- Inner highlight -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#e8d5a0" stroke-width="0.8" opacity="0.25"/>

    <!-- Light reflection arc -->
    <path d="M -75 -75 A 110 110 0 0 1 -30 -105"
          fill="none" stroke="#f0e4c4" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  </g>

  <!-- Right hoop earring -->
  <g filter="url(#shadow)" transform="translate(395, 380)">
    <!-- Clasp/post at top -->
    <line x1="0" y1="-115" x2="0" y2="-100" stroke="#c6994a" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
    <circle cx="0" cy="-117" r="3" fill="#c6994a" opacity="0.6"/>

    <!-- Hoop -->
    <circle cx="0" cy="0" r="105" fill="none" stroke="url(#hoopGold2)" stroke-width="3" opacity="0.85"/>
    <circle cx="0" cy="0" r="105" fill="none" stroke="#e8d5a0" stroke-width="0.8" opacity="0.25"/>

    <!-- Light reflection arc -->
    <path d="M 75 -70 A 105 105 0 0 0 30 -100"
          fill="none" stroke="#f0e4c4" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  </g>

  <!-- Subtle ground shadow -->
  <ellipse cx="295" cy="530" rx="180" ry="5" fill="#c6994a" opacity="0.03"/>

  <!-- Brand text -->
  <text x="300" y="740" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" letter-spacing="8" fill="#c6994a" opacity="0.08" font-variant="small-caps">BY COLLECTION</text>
</svg>