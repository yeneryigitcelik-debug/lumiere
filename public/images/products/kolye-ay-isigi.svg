<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf6ef"/>
      <stop offset="100%" stop-color="#f3ead5"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4b574"/>
      <stop offset="50%" stop-color="#c6994a"/>
      <stop offset="100%" stop-color="#b8862f"/>
    </linearGradient>
    <linearGradient id="moonGold" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#e8d5a0"/>
      <stop offset="50%" stop-color="#d4b574"/>
      <stop offset="100%" stop-color="#b8862f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#b8862f" flood-opacity="0.15"/>
    </filter>
    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="spotlight" cx="0.5" cy="0.42" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#spotlight)"/>

  <!-- Chain -->
  <path d="M 230 70 Q 260 110 285 150 Q 295 170 300 185" stroke="url(#gold)" stroke-width="1.2" fill="none" opacity="0.5"/>
  <path d="M 370 70 Q 340 110 315 150 Q 305 170 300 185" stroke="url(#gold)" stroke-width="1.2" fill="none" opacity="0.5"/>
  <line x1="230" y1="70" x2="190" y2="50" stroke="#c6994a" stroke-width="1" opacity="0.3"/>
  <line x1="370" y1="70" x2="410" y2="50" stroke="#c6994a" stroke-width="1" opacity="0.3"/>

  <!-- Bail -->
  <ellipse cx="300" cy="200" rx="10" ry="15" fill="none" stroke="url(#gold)" stroke-width="2" filter="url(#shadow)"/>

  <!-- Crescent Moon -->
  <g filter="url(#shadow)" transform="translate(300, 360)">
    <path d="M 0 -110
             C 60 -110 110 -60 110 0
             C 110 60 60 110 0 110
             C -60 110 -110 60 -110 0
             C -110 -60 -60 -110 0 -110 Z"
          fill="url(#moonGold)" opacity="0.9"/>
    <!-- Inner circle cutout to form crescent -->
    <circle cx="35" cy="-15" r="85" fill="url(#bg)"/>
  </g>

  <!-- Moon edge highlight -->
  <path d="M 225 265 C 200 305 195 355 205 395 C 215 435 240 460 265 465"
        fill="none" stroke="#e8d5a0" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>

  <!-- Star accent 1 -->
  <g transform="translate(375, 275)" filter="url(#starGlow)">
    <path d="M 0 -14 L 3.5 -3.5 L 14 0 L 3.5 3.5 L 0 14 L -3.5 3.5 L -14 0 L -3.5 -3.5 Z"
          fill="#d4b574" opacity="0.7"/>
  </g>

  <!-- Star accent 2 -->
  <g transform="translate(395, 340)" filter="url(#starGlow)">
    <path d="M 0 -9 L 2.2 -2.2 L 9 0 L 2.2 2.2 L 0 9 L -2.2 2.2 L -9 0 L -2.2 -2.2 Z"
          fill="#d4b574" opacity="0.5"/>
  </g>

  <!-- Star accent 3 -->
  <g transform="translate(360, 400)" filter="url(#starGlow)">
    <path d="M 0 -6 L 1.5 -1.5 L 6 0 L 1.5 1.5 L 0 6 L -1.5 1.5 L -6 0 L -1.5 -1.5 Z"
          fill="#d4b574" opacity="0.45"/>
  </g>

  <!-- Tiny dot stars -->
  <circle cx="405" cy="300" r="2" fill="#c6994a" opacity="0.3"/>
  <circle cx="385" cy="370" r="1.5" fill="#c6994a" opacity="0.25"/>
  <circle cx="355" cy="255" r="1.5" fill="#c6994a" opacity="0.2"/>

  <!-- Brand text -->
  <text x="300" y="740" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" letter-spacing="8" fill="#c6994a" opacity="0.08" font-variant="small-caps">BY COLLECTION</text>
</svg>