<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf6ef"/>
      <stop offset="100%" stop-color="#f3ead5"/>
    </linearGradient>
    <linearGradient id="goldH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8862f"/>
      <stop offset="30%" stop-color="#d4b574"/>
      <stop offset="50%" stop-color="#e8d5a0"/>
      <stop offset="70%" stop-color="#d4b574"/>
      <stop offset="100%" stop-color="#b8862f"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8d5a0"/>
      <stop offset="50%" stop-color="#c6994a"/>
      <stop offset="100%" stop-color="#a07530"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#b8862f" flood-opacity="0.18"/>
    </filter>
    <filter id="innerGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="spotlight" cx="0.5" cy="0.45" r="0.45">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#spotlight)"/>

  <!-- Ring band - elegant ellipse viewed at angle -->
  <g filter="url(#shadow)" transform="translate(300, 420)">
    <!-- Outer ring -->
    <ellipse cx="0" cy="0" rx="120" ry="155" fill="none" stroke="url(#goldH)" stroke-width="18" opacity="0.9"/>
    <!-- Inner highlight -->
    <ellipse cx="0" cy="0" rx="120" ry="155" fill="none" stroke="#e8d5a0" stroke-width="1" opacity="0.25"/>
    <!-- Inner edge -->
    <ellipse cx="0" cy="0" rx="108" ry="143" fill="none" stroke="#a07530" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Infinity symbol on the ring band -->
  <g filter="url(#innerGlow)" transform="translate(300, 320)">
    <path d="M 0 0
             C -15 -25 -45 -35 -60 -20
             C -80 0 -60 30 -40 30
             C -25 30 -10 15 0 0
             C 10 -15 25 -30 40 -30
             C 60 -30 80 0 60 20
             C 45 35 15 25 0 0 Z"
          fill="none" stroke="#e8d5a0" stroke-width="2.5" opacity="0.7"/>
    <path d="M 0 0
             C -15 -25 -45 -35 -60 -20
             C -80 0 -60 30 -40 30
             C -25 30 -10 15 0 0
             C 10 -15 25 -30 40 -30
             C 60 -30 80 0 60 20
             C 45 35 15 25 0 0 Z"
          fill="none" stroke="#c6994a" stroke-width="1.2" opacity="0.5"/>
  </g>

  <!-- Subtle reflection on ring -->
  <path d="M 195 340 Q 185 400 195 460" fill="none" stroke="#f0e4c4" stroke-width="3" opacity="0.2" stroke-linecap="round"/>

  <!-- Light gleam at top -->
  <ellipse cx="300" cy="268" rx="30" ry="4" fill="#f5ecd8" opacity="0.3"/>

  <!-- Brand text -->
  <text x="300" y="740" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" letter-spacing="8" fill="#c6994a" opacity="0.08" font-variant="small-caps">BY COLLECTION</text>
</svg>