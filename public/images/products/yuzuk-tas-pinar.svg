<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf6ef"/>
      <stop offset="100%" stop-color="#f3ead5"/>
    </linearGradient>
    <linearGradient id="goldH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8862f"/>
      <stop offset="30%" stop-color="#d4b574"/>
      <stop offset="50%" stop-color="#e8d5a0"/>
      <stop offset="70%" stop-color="#d4b574"/>
      <stop offset="100%" stop-color="#b8862f"/>
    </linearGradient>
    <linearGradient id="gem" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#d4b574"/>
      <stop offset="30%" stop-color="#c6994a"/>
      <stop offset="70%" stop-color="#9a6b24"/>
      <stop offset="100%" stop-color="#7a5518"/>
    </linearGradient>
    <linearGradient id="gemHighlight" x1="0.3" y1="0" x2="0.7" y2="0.6">
      <stop offset="0%" stop-color="#f0e4c4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c6994a" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#b8862f" flood-opacity="0.18"/>
    </filter>
    <filter id="gemGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#c6994a" flood-opacity="0.25"/>
    </filter>
    <radialGradient id="spotlight" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#spotlight)"/>

  <!-- Ring band -->
  <g filter="url(#shadow)" transform="translate(300, 430)">
    <ellipse cx="0" cy="0" rx="115" ry="150" fill="none" stroke="url(#goldH)" stroke-width="16" opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="115" ry="150" fill="none" stroke="#e8d5a0" stroke-width="1" opacity="0.2"/>
    <ellipse cx="0" cy="0" rx="105" ry="140" fill="none" stroke="#a07530" stroke-width="0.5" opacity="0.25"/>
  </g>

  <!-- Prong setting left -->
  <path d="M 272 290 L 265 310 Q 268 315 275 318" fill="none" stroke="#c6994a" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
  <!-- Prong setting right -->
  <path d="M 328 290 L 335 310 Q 332 315 325 318" fill="none" stroke="#c6994a" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>

  <!-- Gemstone -->
  <g filter="url(#gemGlow)">
    <circle cx="300" cy="285" r="42" fill="url(#gem)" opacity="0.9"/>
    <!-- Facet lines -->
    <path d="M 300 245 L 275 285 L 300 325 L 325 285 Z" fill="none" stroke="#9a6b24" stroke-width="0.8" opacity="0.3"/>
    <line x1="300" y1="245" x2="300" y2="325" stroke="#9a6b24" stroke-width="0.5" opacity="0.2"/>
    <line x1="260" y1="285" x2="340" y2="285" stroke="#9a6b24" stroke-width="0.5" opacity="0.2"/>
    <!-- Highlight -->
    <ellipse cx="288" cy="272" rx="14" ry="10" fill="url(#gemHighlight)" opacity="0.6"/>
    <!-- Rim -->
    <circle cx="300" cy="285" r="42" fill="none" stroke="#d4b574" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Subtle band reflection -->
  <path d="M 198 360 Q 188 430 198 500" fill="none" stroke="#f0e4c4" stroke-width="3" opacity="0.15" stroke-linecap="round"/>

  <!-- Brand text -->
  <text x="300" y="740" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" letter-spacing="8" fill="#c6994a" opacity="0.08" font-variant="small-caps">BY COLLECTION</text>
</svg>