<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf6ef"/>
      <stop offset="100%" stop-color="#f3ead5"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4b574"/>
      <stop offset="50%" stop-color="#c6994a"/>
      <stop offset="100%" stop-color="#b8862f"/>
    </linearGradient>
    <linearGradient id="heartGold" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#e8d5a0"/>
      <stop offset="40%" stop-color="#d4b574"/>
      <stop offset="100%" stop-color="#a07530"/>
    </linearGradient>
    <linearGradient id="facetLight" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f5ecd8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c6994a" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#b8862f" flood-opacity="0.15"/>
    </filter>
    <filter id="sparkle" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="spotlight" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#spotlight)"/>

  <!-- Chain -->
  <path d="M 230 75 Q 260 115 285 155 Q 295 175 300 190" stroke="url(#gold)" stroke-width="1.2" fill="none" opacity="0.5"/>
  <path d="M 370 75 Q 340 115 315 155 Q 305 175 300 190" stroke="url(#gold)" stroke-width="1.2" fill="none" opacity="0.5"/>
  <line x1="230" y1="75" x2="190" y2="55" stroke="#c6994a" stroke-width="1" opacity="0.3"/>
  <line x1="370" y1="75" x2="410" y2="55" stroke="#c6994a" stroke-width="1" opacity="0.3"/>

  <!-- Bail -->
  <ellipse cx="300" cy="200" rx="8" ry="13" fill="none" stroke="url(#gold)" stroke-width="2" filter="url(#shadow)"/>

  <!-- Heart pendant -->
  <g filter="url(#shadow)" transform="translate(300, 340)">
    <!-- Heart outline filled -->
    <path d="M 0 -60
             C 0 -60 -10 -90 -50 -90
             C -90 -90 -100 -50 -100 -30
             C -100 20 -50 60 0 100
             C 50 60 100 20 100 -30
             C 100 -50 90 -90 50 -90
             C 10 -90 0 -60 0 -60 Z"
          fill="url(#heartGold)" opacity="0.85"/>

    <!-- Facet lines for diamond/faceted look -->
    <!-- Center vertical -->
    <line x1="0" y1="-60" x2="0" y2="100" stroke="#a07530" stroke-width="0.8" opacity="0.25"/>
    <!-- Top to bottom-left facets -->
    <line x1="0" y1="-60" x2="-70" y2="10" stroke="#a07530" stroke-width="0.6" opacity="0.2"/>
    <line x1="0" y1="-60" x2="70" y2="10" stroke="#a07530" stroke-width="0.6" opacity="0.2"/>
    <!-- Middle horizontal -->
    <path d="M -95 -25 Q -50 -10 0 -15 Q 50 -10 95 -25" fill="none" stroke="#a07530" stroke-width="0.6" opacity="0.18"/>
    <!-- Lower facets -->
    <line x1="-70" y1="10" x2="0" y2="100" stroke="#a07530" stroke-width="0.5" opacity="0.15"/>
    <line x1="70" y1="10" x2="0" y2="100" stroke="#a07530" stroke-width="0.5" opacity="0.15"/>
    <!-- Cross facets -->
    <line x1="-70" y1="10" x2="70" y2="10" stroke="#a07530" stroke-width="0.5" opacity="0.15"/>

    <!-- Highlight areas -->
    <path d="M -20 -70 L -70 -10 L -30 10 Z" fill="url(#facetLight)" opacity="0.3"/>
    <path d="M 20 -70 L 70 -10 L 30 10 Z" fill="url(#facetLight)" opacity="0.2"/>

    <!-- Outer glow/edge -->
    <path d="M 0 -60
             C 0 -60 -10 -90 -50 -90
             C -90 -90 -100 -50 -100 -30
             C -100 20 -50 60 0 100
             C 50 60 100 20 100 -30
             C 100 -50 90 -90 50 -90
             C 10 -90 0 -60 0 -60 Z"
          fill="none" stroke="#d4b574" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Sparkle accents -->
  <g filter="url(#sparkle)">
    <path d="M 0 -6 L 1.5 -1.5 L 6 0 L 1.5 1.5 L 0 6 L -1.5 1.5 L -6 0 L -1.5 -1.5 Z"
          fill="#e8d5a0" opacity="0.5" transform="translate(235, 290)"/>
    <path d="M 0 -5 L 1.2 -1.2 L 5 0 L 1.2 1.2 L 0 5 L -1.2 1.2 L -5 0 L -1.2 -1.2 Z"
          fill="#e8d5a0" opacity="0.35" transform="translate(370, 310)"/>
  </g>

  <!-- Brand text -->
  <text x="300" y="740" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" letter-spacing="8" fill="#c6994a" opacity="0.08" font-variant="small-caps">LUMIERE</text>
</svg>