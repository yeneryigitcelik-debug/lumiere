<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf6ef"/>
      <stop offset="100%" stop-color="#f3ead5"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4b574"/>
      <stop offset="50%" stop-color="#c6994a"/>
      <stop offset="100%" stop-color="#b8862f"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#e8d5a0"/>
      <stop offset="40%" stop-color="#d4b574"/>
      <stop offset="100%" stop-color="#a07530"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#b8862f" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="spotlight" cx="0.5" cy="0.42" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#spotlight)"/>

  <!-- Chain -->
  <path d="M 300 120 Q 300 140 300 160" stroke="url(#gold)" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M 240 80 Q 260 110 280 135 Q 290 150 300 160" stroke="url(#gold)" stroke-width="1.2" fill="none" opacity="0.5"/>
  <path d="M 360 80 Q 340 110 320 135 Q 310 150 300 160" stroke="url(#gold)" stroke-width="1.2" fill="none" opacity="0.5"/>

  <!-- Chain detail lines -->
  <line x1="240" y1="80" x2="200" y2="60" stroke="#c6994a" stroke-width="1" opacity="0.3"/>
  <line x1="360" y1="80" x2="400" y2="60" stroke="#c6994a" stroke-width="1" opacity="0.3"/>

  <!-- Bail / connector -->
  <ellipse cx="300" cy="175" rx="12" ry="18" fill="none" stroke="url(#gold)" stroke-width="2.5" filter="url(#shadow)"/>

  <!-- Teardrop pendant -->
  <g filter="url(#shadow)">
    <path d="M 300 200
             C 300 200 240 310 240 380
             C 240 420 265 470 300 470
             C 335 470 360 420 360 380
             C 360 310 300 200 300 200 Z"
          fill="url(#goldShine)" opacity="0.9"/>
  </g>

  <!-- Inner teardrop highlight -->
  <path d="M 300 230
           C 300 230 260 320 260 370
           C 260 400 278 435 300 435
           C 322 435 340 400 340 370
           C 340 320 300 230 300 230 Z"
        fill="none" stroke="#e8d5a0" stroke-width="1" opacity="0.4"/>

  <!-- Light reflection on pendant -->
  <path d="M 285 270
           C 285 270 270 330 275 370
           C 277 385 280 390 285 395"
        fill="none" stroke="#f0e4c4" stroke-width="2" opacity="0.3" stroke-linecap="round"/>

  <!-- Subtle inner glow -->
  <ellipse cx="290" cy="350" rx="20" ry="40" fill="#f0e4c4" opacity="0.15"/>

  <!-- Brand text -->
  <text x="300" y="740" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" letter-spacing="8" fill="#c6994a" opacity="0.08" font-variant="small-caps">LUMIERE</text>
</svg>