<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf6ef"/>
      <stop offset="100%" stop-color="#f3ead5"/>
    </linearGradient>
    <linearGradient id="goldDrop" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#e8d5a0"/>
      <stop offset="40%" stop-color="#d4b574"/>
      <stop offset="100%" stop-color="#a07530"/>
    </linearGradient>
    <linearGradient id="goldDrop2" x1="0.8" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#e8d5a0"/>
      <stop offset="40%" stop-color="#d4b574"/>
      <stop offset="100%" stop-color="#a07530"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#b8862f" flood-opacity="0.15"/>
    </filter>
    <radialGradient id="spotlight" cx="0.5" cy="0.42" r="0.48">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#spotlight)"/>

  <!-- Left earring -->
  <g filter="url(#shadow)" transform="translate(210, 300)">
    <!-- Hook -->
    <path d="M 0 -80 C -5 -80 -10 -70 -10 -60 C -10 -50 -5 -42 0 -42 C 5 -42 8 -48 8 -55"
          fill="none" stroke="#c6994a" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
    <!-- Connector -->
    <line x1="0" y1="-42" x2="0" y2="-25" stroke="#c6994a" stroke-width="1.8" opacity="0.7"/>
    <!-- Teardrop -->
    <path d="M 0 -25
             C 0 -25 -40 50 -40 90
             C -40 118 -22 140 0 140
             C 22 140 40 118 40 90
             C 40 50 0 -25 0 -25 Z"
          fill="url(#goldDrop)" opacity="0.9"/>
    <!-- Highlight -->
    <path d="M -10 20 C -12 50 -10 80 -8 100"
          fill="none" stroke="#f0e4c4" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
    <!-- Inner line -->
    <path d="M 0 -5
             C 0 -5 -25 45 -25 75
             C -25 95 -14 110 0 110
             C 14 110 25 95 25 75
             C 25 45 0 -5 0 -5 Z"
          fill="none" stroke="#e8d5a0" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Right earring -->
  <g filter="url(#shadow)" transform="translate(390, 310)">
    <!-- Hook -->
    <path d="M 0 -80 C 5 -80 10 -70 10 -60 C 10 -50 5 -42 0 -42 C -5 -42 -8 -48 -8 -55"
          fill="none" stroke="#c6994a" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
    <!-- Connector -->
    <line x1="0" y1="-42" x2="0" y2="-25" stroke="#c6994a" stroke-width="1.8" opacity="0.7"/>
    <!-- Teardrop -->
    <path d="M 0 -25
             C 0 -25 -40 50 -40 90
             C -40 118 -22 140 0 140
             C 22 140 40 118 40 90
             C 40 50 0 -25 0 -25 Z"
          fill="url(#goldDrop2)" opacity="0.9"/>
    <!-- Highlight -->
    <path d="M 10 20 C 12 50 10 80 8 100"
          fill="none" stroke="#f0e4c4" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
    <!-- Inner line -->
    <path d="M 0 -5
             C 0 -5 -25 45 -25 75
             C -25 95 -14 110 0 110
             C 14 110 25 95 25 75
             C 25 45 0 -5 0 -5 Z"
          fill="none" stroke="#e8d5a0" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Subtle ground shadow -->
  <ellipse cx="300" cy="530" rx="160" ry="6" fill="#c6994a" opacity="0.04"/>

  <!-- Brand text -->
  <text x="300" y="740" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" letter-spacing="8" fill="#c6994a" opacity="0.08" font-variant="small-caps">BY COLLECTION</text>
</svg>