<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf6ef"/>
      <stop offset="100%" stop-color="#f3ead5"/>
    </linearGradient>
    <linearGradient id="moonGold" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#e8d5a0"/>
      <stop offset="50%" stop-color="#d4b574"/>
      <stop offset="100%" stop-color="#b8862f"/>
    </linearGradient>
    <linearGradient id="starGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8d5a0"/>
      <stop offset="50%" stop-color="#c6994a"/>
      <stop offset="100%" stop-color="#a07530"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#b8862f" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="spotlight" cx="0.5" cy="0.42" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#spotlight)"/>

  <!-- Crescent Moon - larger, positioned left-center -->
  <g filter="url(#shadow)" transform="translate(240, 350)">
    <path d="M 0 -100
             C 55 -100 100 -55 100 0
             C 100 55 55 100 0 100
             C -55 100 -100 55 -100 0
             C -100 -55 -55 -100 0 -100 Z"
          fill="url(#moonGold)" opacity="0.88"/>
    <circle cx="32" cy="-12" r="78" fill="url(#bg)"/>
    <!-- Moon highlight -->
    <path d="M -65 -55 C -80 -20 -80 20 -65 55"
          fill="none" stroke="#e8d5a0" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
  </g>

  <!-- Star - positioned right, slightly above -->
  <g filter="url(#shadow)" transform="translate(380, 290)">
    <path d="M 0 -55
             L 13 -18
             L 52 -17
             L 21 8
             L 32 45
             L 0 22
             L -32 45
             L -21 8
             L -52 -17
             L -13 -18
             Z"
          fill="url(#starGold)" opacity="0.88"/>
    <!-- Star inner highlight -->
    <path d="M 0 -35
             L 8 -12
             L 33 -11
             L 13 5
             L 20 28
             L 0 14
             L -20 28
             L -13 5
             L -33 -11
             L -8 -12
             Z"
          fill="none" stroke="#e8d5a0" stroke-width="0.8" opacity="0.3"/>
    <!-- Center glow -->
    <circle cx="0" cy="2" r="8" fill="#f0e4c4" opacity="0.15"/>
  </g>

  <!-- Small decorative stars -->
  <g filter="url(#glow)">
    <path d="M 0 -8 L 2 -2 L 8 0 L 2 2 L 0 8 L -2 2 L -8 0 L -2 -2 Z"
          fill="#d4b574" opacity="0.4" transform="translate(440, 380)"/>
    <path d="M 0 -6 L 1.5 -1.5 L 6 0 L 1.5 1.5 L 0 6 L -1.5 1.5 L -6 0 L -1.5 -1.5 Z"
          fill="#d4b574" opacity="0.3" transform="translate(170, 240)"/>
    <path d="M 0 -5 L 1.2 -1.2 L 5 0 L 1.2 1.2 L 0 5 L -1.2 1.2 L -5 0 L -1.2 -1.2 Z"
          fill="#d4b574" opacity="0.25" transform="translate(420, 450)"/>
  </g>

  <!-- Tiny sparkle dots -->
  <circle cx="460" cy="260" r="2" fill="#c6994a" opacity="0.2"/>
  <circle cx="350" cy="210" r="1.5" fill="#c6994a" opacity="0.18"/>
  <circle cx="480" cy="340" r="1.5" fill="#c6994a" opacity="0.15"/>

  <!-- Subtle connecting line between moon and star -->
  <path d="M 280 280 Q 320 260 360 270" fill="none" stroke="#c6994a" stroke-width="0.5" opacity="0.15"/>

  <!-- Brand text -->
  <text x="300" y="740" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" letter-spacing="8" fill="#c6994a" opacity="0.08" font-variant="small-caps">LUMIERE</text>
</svg>