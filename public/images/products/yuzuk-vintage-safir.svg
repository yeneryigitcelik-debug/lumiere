<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf6ef"/>
      <stop offset="100%" stop-color="#f3ead5"/>
    </linearGradient>
    <linearGradient id="goldH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8862f"/>
      <stop offset="30%" stop-color="#d4b574"/>
      <stop offset="50%" stop-color="#e8d5a0"/>
      <stop offset="70%" stop-color="#d4b574"/>
      <stop offset="100%" stop-color="#b8862f"/>
    </linearGradient>
    <linearGradient id="sapphire" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#4a6fa5"/>
      <stop offset="30%" stop-color="#3a5d8f"/>
      <stop offset="70%" stop-color="#2d4a7a"/>
      <stop offset="100%" stop-color="#1e3560"/>
    </linearGradient>
    <linearGradient id="sapphireHighlight" x1="0.3" y1="0" x2="0.7" y2="0.5">
      <stop offset="0%" stop-color="#8aaed4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2d4a7a" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#b8862f" flood-opacity="0.18"/>
    </filter>
    <filter id="gemGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#2d4a7a" flood-opacity="0.2"/>
    </filter>
    <radialGradient id="spotlight" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#spotlight)"/>

  <!-- Ring band -->
  <g filter="url(#shadow)" transform="translate(300, 430)">
    <ellipse cx="0" cy="0" rx="115" ry="150" fill="none" stroke="url(#goldH)" stroke-width="14" opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="115" ry="150" fill="none" stroke="#e8d5a0" stroke-width="0.8" opacity="0.2"/>
    <ellipse cx="0" cy="0" rx="107" ry="142" fill="none" stroke="#a07530" stroke-width="0.5" opacity="0.25"/>
  </g>

  <!-- Ornate setting - decorative filigree around stone -->
  <g transform="translate(300, 285)" opacity="0.65">
    <!-- Left scroll -->
    <path d="M -55 10 C -65 0 -65 -15 -55 -20 C -45 -25 -40 -15 -45 -8"
          fill="none" stroke="#c6994a" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Right scroll -->
    <path d="M 55 10 C 65 0 65 -15 55 -20 C 45 -25 40 -15 45 -8"
          fill="none" stroke="#c6994a" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Bottom decorative -->
    <path d="M -35 30 C -25 40 -10 45 0 45 C 10 45 25 40 35 30"
          fill="none" stroke="#c6994a" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Small dots -->
    <circle cx="-52" cy="18" r="2" fill="#c6994a" opacity="0.5"/>
    <circle cx="52" cy="18" r="2" fill="#c6994a" opacity="0.5"/>
    <circle cx="-40" cy="35" r="1.5" fill="#c6994a" opacity="0.4"/>
    <circle cx="40" cy="35" r="1.5" fill="#c6994a" opacity="0.4"/>
    <circle cx="0" cy="48" r="1.5" fill="#c6994a" opacity="0.4"/>
  </g>

  <!-- Prong settings -->
  <g stroke="#c6994a" stroke-width="2.5" fill="none" opacity="0.7" stroke-linecap="round">
    <path d="M 262 285 L 258 300 Q 260 308 266 312"/>
    <path d="M 338 285 L 342 300 Q 340 308 334 312"/>
    <path d="M 300 252 L 300 260 Q 300 265 300 268"/>
    <path d="M 300 328 L 300 335 Q 300 340 300 342"/>
  </g>

  <!-- Oval sapphire stone -->
  <g filter="url(#gemGlow)">
    <ellipse cx="300" cy="290" rx="42" ry="50" fill="url(#sapphire)" opacity="0.92"/>
    <!-- Facet lines -->
    <ellipse cx="300" cy="290" rx="28" ry="34" fill="none" stroke="#1e3560" stroke-width="0.6" opacity="0.3"/>
    <line x1="300" y1="242" x2="300" y2="338" stroke="#1e3560" stroke-width="0.5" opacity="0.2"/>
    <line x1="260" y1="290" x2="340" y2="290" stroke="#1e3560" stroke-width="0.5" opacity="0.2"/>
    <line x1="270" y1="255" x2="330" y2="325" stroke="#1e3560" stroke-width="0.4" opacity="0.15"/>
    <line x1="330" y1="255" x2="270" y2="325" stroke="#1e3560" stroke-width="0.4" opacity="0.15"/>
    <!-- Highlight -->
    <ellipse cx="288" cy="275" rx="14" ry="12" fill="url(#sapphireHighlight)" opacity="0.6"/>
    <!-- Rim -->
    <ellipse cx="300" cy="290" rx="42" ry="50" fill="none" stroke="#d4b574" stroke-width="2.5" opacity="0.6"/>
  </g>

  <!-- Band reflection -->
  <path d="M 198 360 Q 188 430 198 500" fill="none" stroke="#f0e4c4" stroke-width="2.5" opacity="0.15" stroke-linecap="round"/>

  <!-- Brand text -->
  <text x="300" y="740" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" letter-spacing="8" fill="#c6994a" opacity="0.08" font-variant="small-caps">LUMIERE</text>
</svg>